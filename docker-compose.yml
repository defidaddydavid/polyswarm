version: "3.9"

services:
  polyswarm:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEBATE_ROUNDS=${DEBATE_ROUNDS:-2}
      - SWARM_SIZE=${SWARM_SIZE:-8}
      - MODEL_FAST=${MODEL_FAST:-claude-3-5-haiku-20241022}
      - MODEL_DEEP=${MODEL_DEEP:-claude-3-5-sonnet-20241022}
      - DATABASE_URL=sqlite+aiosqlite:///./data/polyswarm.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
